/**
 * Android app-level Gradle build configuration.
 * Configures Material You theming and app settings.
 */

apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

/**
 * Import React Native Plugin configuration.
 */
react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
}

/**
 * Android configuration
 */
android {
    namespace "com.runic"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.runic"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"

        // Enable Material You dynamic colors (Android 12+)
        manifestPlaceholders = [
            dynamicColors: "true"
        ]
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
    }

    // Enable Java 17 features
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")

    // Material Design 3 for Material You
    implementation "com.google.android.material:material:1.11.0"

    // Core Android libraries
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.appcompat:appcompat:1.6.1"

    // Notification support
    implementation "androidx.work:work-runtime:2.9.0"

    debugImplementation("com.facebook.flipper:flipper:${FLIPPER_VERSION}")
    debugImplementation("com.facebook.flipper:flipper-network-plugin:${FLIPPER_VERSION}")
    debugImplementation("com.facebook.flipper:flipper-fresco-plugin:${FLIPPER_VERSION}")
}
