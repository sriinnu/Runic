<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" fill="none">
  <!-- OPTION A: All States Demonstration -->
  <!-- Shows different pressure levels, providers, and conditions -->

  <!-- Grid layout: 4 columns × 3 rows -->

  <!-- Row 1: Pressure States -->
  <g id="state-safe" transform="translate(10, 10)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Safe (0-50%)</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="40" cy="24" r="8" fill="#FFFFFF"/>
    <rect x="36" y="20" width="2" height="8" fill="#14B8A6"/>
    <rect x="42" y="20" width="2" height="8" fill="#14B8A6"/>
  </g>

  <g id="state-warning" transform="translate(95, 10)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Warning (50-80%)</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#FFB84D" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="40" cy="24" r="8" fill="#FFFFFF"/>
    <rect x="36" y="20" width="2" height="8" fill="#FFB84D"/>
    <rect x="42" y="20" width="2" height="8" fill="#FFB84D"/>
  </g>

  <g id="state-critical" transform="translate(180, 10)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Critical (80-100%)</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#FF4F70" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="40" cy="24" r="8" fill="#FFFFFF"/>
    <rect x="36" y="20" width="2" height="8" fill="#FF4F70"/>
    <rect x="42" y="20" width="2" height="8" fill="#FF4F70"/>
  </g>

  <g id="state-stale" transform="translate(265, 10)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Stale Data</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.55"/>
    <circle cx="40" cy="24" r="8" fill="#FFFFFF" opacity="0.55"/>
    <rect x="36" y="20" width="2" height="8" fill="#14B8A6" opacity="0.55"/>
    <rect x="42" y="20" width="2" height="8" fill="#14B8A6" opacity="0.55"/>
  </g>

  <!-- Row 2: Provider Variations -->
  <g id="provider-claude" transform="translate(10, 85)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Claude</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Claude: vertical slits -->
    <rect x="35" y="20" width="2" height="8" fill="#14B8A6"/>
    <rect x="43" y="20" width="2" height="8" fill="#14B8A6"/>
  </g>

  <g id="provider-codex" transform="translate(95, 85)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Codex</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Codex: square eyes -->
    <rect x="33" y="21" width="4" height="4" fill="#14B8A6"/>
    <rect x="43" y="21" width="4" height="4" fill="#14B8A6"/>
  </g>

  <g id="provider-gemini" transform="translate(180, 85)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Gemini</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Gemini: diamond -->
    <path d="M 40,18 L 46,24 L 40,30 L 34,24 Z" fill="#14B8A6"/>
  </g>

  <g id="provider-cursor" transform="translate(265, 85)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Cursor</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Cursor: arrow pointer -->
    <path d="M 44,24 L 36,20 L 36,28 Z" fill="#14B8A6"/>
  </g>

  <!-- Row 3: Special States -->
  <g id="template-mode-light" transform="translate(10, 160)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Template (Light)</text>
    <rect x="0" y="0" width="80" height="48" fill="#FFFFFF" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
    <rect x="36" y="20" width="2" height="8" fill="#000000" opacity="0.85"/>
    <rect x="42" y="20" width="2" height="8" fill="#000000" opacity="0.85"/>
  </g>

  <g id="template-mode-dark" transform="translate(95, 160)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Template (Dark)</text>
    <rect x="0" y="0" width="80" height="48" fill="#2C2C2C" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
    <rect x="36" y="20" width="2" height="8" fill="#FFFFFF" opacity="0.85"/>
    <rect x="42" y="20" width="2" height="8" fill="#FFFFFF" opacity="0.85"/>
  </g>

  <g id="combined-providers" transform="translate(180, 160)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Multiple Providers</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Combined: stacked dots -->
    <circle cx="37" cy="21" r="2.5" fill="#14B8A6"/>
    <circle cx="43" cy="21" r="2.5" fill="#14B8A6"/>
    <circle cx="37" cy="27" r="2.5" fill="#14B8A6"/>
    <circle cx="43" cy="27" r="2.5" fill="#14B8A6"/>
  </g>

  <g id="syncing-state" transform="translate(265, 160)">
    <text x="0" y="-5" font-family="system-ui" font-size="10" fill="#333">Syncing (Animated)</text>
    <rect x="0" y="0" width="80" height="48" fill="#F0F0F0" rx="4"/>
    <path d="M 12,24 C 12,14 20,10 28,14 C 36,18 36,24 40,24 C 44,24 44,18 52,14 C 60,10 68,14 68,24 C 68,34 60,38 52,34 C 44,30 44,24 40,24 C 36,24 36,30 28,34 C 20,38 12,34 12,24 Z"
          stroke="#14B8A6" stroke-width="8" fill="none" stroke-linecap="round">
      <!-- Pulse animation -->
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <rect x="36" y="20" width="2" height="8" fill="#14B8A6"/>
    <rect x="42" y="20" width="2" height="8" fill="#14B8A6"/>
  </g>
</svg>
