<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48" fill="none">
  <!-- OPTION A: Infinity Symbol + Provider Icon -->
  <!-- Optimized for 40×24pt menubar rendering (80×48px @2x) -->

  <!-- Infinity path - creates the "watching eyes" effect -->
  <!-- Left loop center: (20, 24), Right loop center: (60, 24) -->
  <path d="M 12,24
           C 12,14 20,10 28,14
           C 36,18 36,24 40,24
           C 44,24 44,18 52,14
           C 60,10 68,14 68,24
           C 68,34 60,38 52,34
           C 44,30 44,24 40,24
           C 36,24 36,30 28,34
           C 20,38 12,34 12,24 Z"
        stroke="#14B8A6"
        stroke-width="8"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Provider icon placeholder - center gap -->
  <!-- This would be replaced with actual provider icon (Claude, Codex, etc.) -->
  <g id="provider-icon-placeholder">
    <!-- Circle background for visibility -->
    <circle cx="40" cy="24" r="8" fill="#FFFFFF" opacity="0.9"/>

    <!-- Example: Claude-style vertical slits -->
    <rect x="36" y="20" width="2" height="8" fill="#14B8A6"/>
    <rect x="42" y="20" width="2" height="8" fill="#14B8A6"/>
  </g>

  <!-- Visual annotations (remove in production) -->
  <g id="annotations" opacity="0.3" stroke="#666" stroke-width="0.5" fill="none" stroke-dasharray="2,2">
    <!-- Center gap boundary -->
    <rect x="30" y="16" width="20" height="16"/>
    <!-- Loop centers -->
    <circle cx="20" cy="24" r="2" fill="#FF0000"/>
    <circle cx="60" cy="24" r="2" fill="#FF0000"/>
  </g>
</svg>
